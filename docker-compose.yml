
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: ultragamble-postgres
    environment:
      POSTGRES_DB: gamble_db
      POSTGRES_USER: yourdbusername
      POSTGRES_PASSWORD: yourdbpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
